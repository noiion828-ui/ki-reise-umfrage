<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Umfrage · KI-Reise-Tool — deine Meinung</title>
<style>
  :root{
    --c1:#ff6f91; --c2:#ffb86c; --c3:#2bd1c4; --c4:#7c5cff; --c5:#ffd23f;
    --ink:#2a1f3d; --mut:#6b5e83; --card:#ffffff; --line:#f0e6f5;
  }
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.6 system-ui,'Segoe UI',sans-serif;color:var(--ink);
    background:linear-gradient(160deg,#fff0f3 0,#fef6e9 35%,#e8fbf8 100%);min-height:100vh;padding:0 0 120px}
  .wrap{max-width:740px;margin:0 auto;padding:18px}
  header.hero{background:linear-gradient(135deg,var(--c4),var(--c1) 50%,var(--c2));color:#fff;
    padding:34px 0 30px;text-align:center;border-radius:0 0 28px 28px;box-shadow:0 10px 30px rgba(124,92,255,.25)}
  h1{font-size:27px;margin:0 0 6px;letter-spacing:-.5px}
  .hsub{font-size:14.5px;opacity:.95;margin:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;margin:14px 0;
    box-shadow:0 6px 20px rgba(124,92,255,.07)}
  .intro{background:linear-gradient(135deg,#fff,#fef6ff);border:2px dashed var(--c4)}
  .sec-n{display:inline-flex;width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--c1),var(--c4));
    color:#fff;font-weight:800;align-items:center;justify-content:center;font-size:13px;margin-right:8px}
  .q{font-weight:800;font-size:17px;margin:0 0 2px;color:var(--c4)}
  .ls{font-size:11px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--c1),var(--c4));
    border-radius:6px;padding:2px 8px;margin-left:6px;vertical-align:middle;letter-spacing:.2px}
  .sub{font-size:13.5px;color:var(--mut);margin:0 0 10px}
  .blab{font-weight:700;font-size:14px;margin:12px 0 5px;color:var(--ink)}
  .opts{display:flex;gap:8px;flex-wrap:wrap}
  .opt{padding:8px 14px;border-radius:999px;border:2px solid var(--line);background:#fff;cursor:pointer;
    font-size:14px;font-weight:600;color:var(--mut);transition:.14s;user-select:none}
  .opt:hover{border-color:var(--c3);transform:translateY(-1px)}
  .opt.sel{background:linear-gradient(135deg,var(--c3),var(--c4));border-color:transparent;color:#fff;
    box-shadow:0 4px 14px rgba(43,209,196,.35);transform:translateY(-1px) scale(1.02)}
  .opt.sel::before{content:"✓ "}
  textarea,input.txt{width:100%;background:#fff;color:var(--ink);border:2px solid var(--line);border-radius:13px;
    padding:11px;font:15px system-ui;resize:vertical}
  textarea{min-height:52px;margin-top:6px}
  textarea.big{min-height:96px}
  textarea:focus,input.txt:focus{outline:none;border-color:var(--c3)}
  textarea::placeholder{color:#bcb3cf;opacity:.85;font-style:italic}
  .hint{display:inline-block;font-size:11.5px;font-weight:700;color:var(--c4);background:#f2edff;border-radius:6px;padding:1px 7px;margin-left:6px}
  .langbtn{display:inline-flex;border:2px solid #fff;border-radius:12px;overflow:hidden;margin-top:12px}
  .langbtn button{background:rgba(255,255,255,.25);color:#fff;border:none;padding:5px 14px;cursor:pointer;font-weight:800;font-size:13px}
  .langbtn button.on{background:#fff;color:var(--c4)}
  .savebar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);z-index:50}
  .savebar .inner{max-width:740px;margin:0 auto;padding:11px 16px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .btn{border:none;border-radius:12px;padding:11px 16px;font-weight:800;cursor:pointer;font-size:14px;color:#fff;
    background:linear-gradient(135deg,var(--c1),var(--c4));box-shadow:0 4px 14px rgba(124,92,255,.3)}
  .btn.wa{background:linear-gradient(135deg,#25D366,#128C7E)}
  .btn.ghost{background:#fff;color:var(--c4);border:2px solid var(--line);box-shadow:none}
  .msg{font-weight:800;color:var(--c3)}
  .heart{font-size:13px;color:var(--mut);text-align:center;margin-top:18px}
  label.fld{font-weight:800;font-size:14px;display:block;margin:0 0 5px;color:var(--c1)}
</style>
</head>
<body>

<header class="hero">
  <h1>🧭 <span data-de="Wir bauen ein KI-Reise-Tool — form es mit!" data-en="We are building an AI travel tool — shape it!">Wir bauen ein KI-Reise-Tool — form es mit!</span></h1>
  <p class="hsub" data-de="~4 Min · kein Falsch · du gestaltest mit, nicht nur bewerten 💛" data-en="~4 min · no wrong answers · you co-create, not just rate 💛">~4 Min · kein Falsch · du gestaltest mit 💛</p>
  <div class="langbtn"><button id="lang-de" class="on" onclick="setLang('de')">DE</button><button id="lang-en" onclick="setLang('en')">EN</button></div>
</header>

<div class="wrap">

<div class="card intro">
  <p style="margin:0" data-de="Stell dir vor, du planst eine Reise mit Freunden oder Familie. <b>Heute:</b> 7 Tabs offen, Budget in Excel, Wünsche im Chat-Chaos — am Ende plant eine:r alles allein. <br><br><b>Unser Tool soll das anders machen:</b> Es webt aus den Wünschen <b>aller</b> + Budget + Logistik <b>einen stimmigen Plan</b> — und sagt ehrlich, was zusammenpasst. Kurz: <b>mehr als Recherche-Links ohne Kohärenz</b>. <br><br>Dieser Fragebogen ist nach <b>Liberating-Structures</b>-Logik gebaut: weniger ankreuzen, mehr <b>aus dir heraus</b>. Erste Eingebung zählt. 🌟"
     data-en="Imagine planning a trip with friends or family. <b>Today:</b> 7 tabs open, budget in Excel, wishes lost in chat — and one person plans it all. <br><br><b>Our tool should do it differently:</b> it weaves <b>everyone's</b> wishes + budget + logistics into <b>one coherent plan</b> — and honestly says what fits. In short: <b>more than incoherent research links</b>. <br><br>This survey follows <b>Liberating Structures</b> logic: less ticking, more <b>from within you</b>. First instinct counts. 🌟">
     Stell dir vor, du planst eine Reise mit Freunden …</p>
</div>

<div class="card">
  <label class="fld" data-de="✍️ Dein Name / Kürzel (damit Ion weiß, von wem das Feedback ist)" data-en="✍️ Your name / initials (so Ion knows whose feedback this is)">✍️ Dein Name / Kürzel</label>
  <input class="txt" id="who" placeholder="z. B. Mara">
</div>

<div id="sections"></div>

<p class="heart" data-de="Danke, dass du mitbaust 💛" data-en="Thanks for helping build this 💛">Danke, dass du mitbaust 💛</p>
</div>

<div class="savebar"><div class="inner">
  <span id="msg" class="msg"></span><span style="flex:1"></span>
  <button class="btn wa" onclick="shareFeedback()" data-de="📱 An Ion (WhatsApp)" data-en="📱 To Ion (WhatsApp)">📱 An Ion</button>
  <button class="btn ghost" onclick="copyFeedback()" data-de="📋 Kopieren" data-en="📋 Copy">📋 Kopieren</button>
  <button class="btn ghost" onclick="downloadJSON()" data-de="📤 Datei" data-en="📤 File">📤 Datei</button>
  <button class="btn ghost" onclick="saveState()" data-de="💾 Sichern" data-en="💾 Save">💾 Sichern</button>
</div></div>

<script>
let L='de';
const $=s=>document.querySelector(s);
const T=o=>(o&&(o[L]??o.de))||'';
const ION_WA=''; // Survey ist oeffentlich -> KEINE Nummer (Privacy). Freunde waehlen Kontakt selbst.

// Blocks: {type:'chips',id,label?,opts[],max?,single?} | {type:'text',id,label?,ph,big?}
const SECTIONS=[
 {id:'madtea', icon:'⚡', ls:'Mad Tea', q:{de:'Schnell aus dem Bauch',en:'Quick, from the gut'},
  sub:{de:'Satz zu Ende denken — erste Eingebung, kein langes Grübeln.',en:'Finish the sentence — first instinct, no overthinking.'},
  blocks:[
   {type:'text',id:'mt1',label:{de:'Beim Reiseplanen mit anderen nervt mich am meisten, dass …',en:'When planning trips with others, what annoys me most is that …'},ph:{de:'…',en:'…'}},
   {type:'text',id:'mt2',label:{de:'Die beste Reise meines Lebens war gut, weil …',en:'The best trip of my life was great because …'},ph:{de:'…',en:'…'}},
   {type:'text',id:'mt3',label:{de:'Eine Reise-App würde mich sofort überzeugen, wenn …',en:'A travel app would win me over instantly if …'},ph:{de:'…',en:'…'}},
   {type:'text',id:'mt4',label:{de:'Abschrecken würde mich, wenn …',en:'It would put me off if …'},ph:{de:'…',en:'…'}},
   {type:'text',id:'mt5',label:{de:'Wenn die App EINE Sache perfekt könnte, wäre das …',en:'If the app did ONE thing perfectly, it would be …'},ph:{de:'…',en:'…'}},
  ]},

 {id:'what3', icon:'🪜', ls:'What³', q:{de:'Vom Erleben zur Lösung',en:'From experience to solution'},
  sub:{de:'Drei Stufen: Was ist? → Was bedeutet das? → Was nun?',en:'Three steps: What is? → So what? → Now what?'},
  blocks:[
   {type:'chips',id:'w_what',label:{de:'WAS erlebst du heute beim Gruppen-Reiseplanen? (antippen, was passt)',en:'WHAT do you experience today planning group trips? (tap what fits)'},opts:[
     {id:'budget',de:'💶 Budget/Wer-zahlt-was unklar',en:'💶 budget/who-pays unclear'},
     {id:'diff',de:'🙃 jede:r will was anderes',en:'🙃 everyone wants something else'},
     {id:'one',de:'😮‍💨 eine:r plant alles allein',en:'😮‍💨 one person plans it all'},
     {id:'tools',de:'🪟 zu viele Tools/Tabs',en:'🪟 too many tools/tabs'},
     {id:'research',de:'🌀 Recherche-Overload, keine Kohärenz',en:'🌀 research overload, no coherence'},
     {id:'fiction',de:'💸 unrealistische Pläne',en:'💸 unrealistic plans'},
     {id:'forgot',de:'🐾 Hund/Kind/Diät vergessen',en:'🐾 dog/kid/diet forgotten'},
     {id:'touri',de:'📸 Standard-Touri',en:'📸 standard tourist'}]},
   {type:'text',id:'w_sowhat',label:{de:'SO WHAT — was bedeutet das? Was kostet es dich wirklich (Zeit/Nerven/Streit)?',en:'SO WHAT — what does it mean? What does it really cost you (time/nerves/conflict)?'},ph:{de:'…',en:'…'}},
   {type:'chips',id:'w_now',label:{de:'NOW WHAT — was sollte die App also konkret tun? (antippen + ergänzen)',en:'NOW WHAT — so what should the app actually do? (tap + add)'},opts:[
     {id:'budget',de:'💶 ehrliches Budget + Wer-zahlt-was',en:'💶 honest budget + who-pays'},
     {id:'plan',de:'🧩 Wünsche → ein stimmiger Plan',en:'🧩 wishes → one coherent plan'},
     {id:'match',de:'🔗 Matchmaking wer-mit-wem',en:'🔗 matchmaking who-with-whom'},
     {id:'real',de:'🪞 Reality-Check',en:'🪞 reality-check'},
     {id:'ai',de:'🤖 KI-Tagesplan',en:'🤖 AI day plan'},
     {id:'filter',de:'🐾 Hund/Kind/Diät als Filter',en:'🐾 dog/kid/diet as filter'},
     {id:'local',de:'🗺️ Insider statt Standard',en:'🗺️ insider not standard'},
     {id:'pack',de:'🧳 Packen/Logistik/Recht',en:'🧳 packing/logistics/legal'},
     {id:'async',de:'👯 gemeinsam ausfüllen',en:'👯 fill in together'}]},
   {type:'text',id:'w_nowft',label:{de:'… und was noch? (frei)',en:'… and what else? (free)'},ph:{de:'…',en:'…'}},
  ]},

 {id:'minspecs', icon:'🎯', ls:'Min Specs', q:{de:'Muss vs. Deko',en:'Must vs. nice-to-have'},
  sub:{de:'Das kleinste Set, das wirklich zählt.',en:'The smallest set that truly matters.'},
  blocks:[
   {type:'chips',id:'ms_must',max:3,label:{de:'Was MUSS die App können (max 3), sonst ist sie für dich wertlos?',en:'What MUST the app do (max 3), or it is worthless to you?'},opts:[
     {id:'budget',de:'💶 Budget/Wer-zahlt-was',en:'💶 budget/who-pays'},
     {id:'plan',de:'🧩 Wünsche → ein Plan',en:'🧩 wishes → one plan'},
     {id:'match',de:'🔗 Matchmaking',en:'🔗 matchmaking'},
     {id:'real',de:'🪞 Reality-Check',en:'🪞 reality-check'},
     {id:'ai',de:'🤖 KI-Tagesplan',en:'🤖 AI day plan'},
     {id:'local',de:'🗺️ Insider-Erlebnisse',en:'🗺️ insider experiences'},
     {id:'async',de:'👯 gemeinsam ausfüllen',en:'👯 fill in together'},
     {id:'simple',de:'🪶 super einfach/schnell',en:'🪶 super simple/fast'}]},
   {type:'text',id:'ms_nice',label:{de:'Was ist nur „nice-to-have" / könnte man getrost weglassen?',en:'What is just nice-to-have / could safely be left out?'},ph:{de:'…',en:'…'}},
  ]},

 {id:'ninewhys', icon:'❓', ls:'Nine Whys', q:{de:'Warum eigentlich?',en:'But why?'},
  sub:{de:'Eine Funktion — dann zweimal tiefer fragen.',en:'One feature — then dig twice deeper.'},
  blocks:[
   {type:'chips',id:'nw_top',single:true,label:{de:'Deine WICHTIGSTE Funktion (genau eine):',en:'Your MOST important feature (pick one):'},opts:[
     {id:'budget',de:'💶 Budget/Wer-zahlt-was',en:'💶 budget/who-pays'},
     {id:'plan',de:'🧩 Wünsche → ein Plan',en:'🧩 wishes → one plan'},
     {id:'match',de:'🔗 Matchmaking',en:'🔗 matchmaking'},
     {id:'real',de:'🪞 Reality-Check',en:'🪞 reality-check'},
     {id:'ai',de:'🤖 KI-Tagesplan',en:'🤖 AI day plan'},
     {id:'local',de:'🗺️ Insider-Erlebnisse',en:'🗺️ insider experiences'}]},
   {type:'text',id:'nw_why1',label:{de:'Warum ist dir genau DAS wichtig?',en:'Why is exactly THAT important to you?'},ph:{de:'…',en:'…'}},
   {type:'text',id:'nw_why2',label:{de:'Und warum ist DAS wichtig? (eine Stufe tiefer)',en:'And why is THAT important? (one level deeper)'},ph:{de:'…',en:'…'}},
  ]},

 {id:'triz', icon:'😈', ls:'TRIZ', q:{de:'Sabotage-Spiel',en:'Sabotage game'},
  sub:{de:'Wie müsste die App sein, damit sie dich GARANTIERT vergrault?',en:'How would the app have to be to LOSE you for sure?'},
  blocks:[
   {type:'chips',id:'tz',label:{de:'Tipp alle Garantie-Vergraulungen an:',en:'Tap all guaranteed deal-breakers:'},opts:[
     {id:'complex',de:'🤯 zu kompliziert',en:'🤯 too complicated'},
     {id:'spam',de:'📨 spammt mich',en:'📨 spams me'},
     {id:'data',de:'🕵️ verkauft meine Daten',en:'🕵️ sells my data'},
     {id:'patronize',de:'🙄 bevormundet mich',en:'🙄 patronises me'},
     {id:'steps',de:'🪜 zu viele Schritte/Anmeldung',en:'🪜 too many steps/sign-up'},
     {id:'generic',de:'🥱 generische 08/15-Tipps',en:'🥱 generic cookie-cutter tips'},
     {id:'unreal',de:'🎩 unrealistische Vorschläge',en:'🎩 unrealistic suggestions'},
     {id:'forceall',de:'👮 zwingt alle zur Nutzung',en:'👮 forces everyone to use it'},
     {id:'pricey',de:'💸 zu teuer',en:'💸 too expensive'}]},
   {type:'text',id:'tz_ft',label:{de:'Welche dieser Sabotagen schleichen sich heute schon in echte Apps ein?',en:'Which of these sabotages already creep into real apps today?'},ph:{de:'…',en:'…'}},
  ]},

 {id:'apprec', icon:'💛', ls:'Appreciative', q:{de:'Deine beste Reise',en:'Your best trip'},
  sub:{de:'Eine kleine Geschichte sagt mehr als 10 Häkchen.',en:'A little story says more than 10 ticks.'},
  blocks:[
   {type:'text',id:'ap',big:true,label:{de:'Erzähl von der besten Reise/Planung, die du je hattest — was machte sie gut? Welche Rolle spielten Planung vs. Spontaneität?',en:'Tell me about the best trip/planning you ever had — what made it great? What role did planning vs. spontaneity play?'},ph:{de:'…',en:'…'}},
  ]},

 {id:'usage', icon:'🧮', ls:'Realitäts-Check', q:{de:'Würdest du es nutzen?',en:'Would you use it?'},
  sub:{de:'Ehrlich — auch „nein" hilft.',en:'Honest — even a “no” helps.'},
  blocks:[
   {type:'chips',id:'u_use',label:{de:'Nutzung:',en:'Usage:'},opts:[
     {id:'yes',de:'✅ sofort',en:'✅ right away'},
     {id:'ifgroup',de:'🤝 wenn meine Gruppe mitzieht',en:'🤝 if my group joins'},
     {id:'maybe',de:'🤔 vielleicht',en:'🤔 maybe'},
     {id:'no',de:'🙅 eher nein',en:'🙅 probably not'}]},
   {type:'chips',id:'u_pay',label:{de:'Zahlung:',en:'Payment:'},opts:[
     {id:'none',de:'💰 nichts',en:'💰 nothing'},
     {id:'pro',de:'💰 Pro-Features',en:'💰 pro features'},
     {id:'trip',de:'💰 einmalig pro Reise',en:'💰 one-off per trip'},
     {id:'org',de:'💰 als Organizer-Tool',en:'💰 as organiser tool'}]},
   {type:'text',id:'u_ft',label:{de:'Sonst noch was auf dem Herzen?',en:'Anything else on your mind?'},ph:{de:'…',en:'…'}},
  ]},
];

let pick={}; let text={};
function initState(){ SECTIONS.forEach(s=>s.blocks.forEach(b=>{ if(b.type==='chips'){if(!pick[b.id])pick[b.id]={};} else {if(text[b.id]===undefined)text[b.id]='';} })); }
initState();

function blockHTML(b){
  if(b.type==='chips'){
    const p=pick[b.id]||{};
    const hint=b.max?`<span class="hint">${L==='de'?'max. '+b.max:'max '+b.max}</span>`:(b.single?`<span class="hint">${L==='de'?'genau 1':'pick 1'}</span>`:'');
    return `${b.label?`<p class="blab">${T(b.label)}${hint}</p>`:''}
      <div class="opts">${b.opts.map(o=>`<span class="opt ${p[o.id]?'sel':''}" onclick="toggle('${b.id}','${o.id}')">${T(o)}</span>`).join('')}</div>`;
  }
  return `${b.label?`<label class="blab">${T(b.label)}</label>`:''}
    <textarea class="${b.big?'big':''}" oninput="onText('${b.id}',this.value)" placeholder="${T(b.ph).replace(/"/g,'&quot;')}">${(text[b.id]||'').replace(/</g,'&lt;')}</textarea>`;
}
function render(){
  $('#sections').innerHTML=SECTIONS.map((s,i)=>`
    <div class="card">
      <p class="q"><span class="sec-n">${i+1}</span>${s.icon} ${T(s.q)} <span class="ls">LS · ${s.ls}</span></p>
      ${s.sub?`<p class="sub">${T(s.sub)}</p>`:''}
      ${s.blocks.map(blockHTML).join('')}
    </div>`).join('');
}
function blockMeta(bid){ for(const s of SECTIONS){ const b=s.blocks.find(x=>x.id===bid); if(b)return b; } return null; }
function toggle(bid,oid){
  const b=blockMeta(bid), p=pick[bid];
  if(b.single){ const on=p[oid]; for(const k in p)p[k]=false; p[oid]=!on; render(); save_silent(); return; }
  if(!p[oid] && b.max){ const n=Object.keys(p).filter(k=>p[k]).length; if(n>=b.max){ flash(L==='de'?('max. '+b.max+'!'):('max '+b.max+'!')); return; } }
  p[oid]=!p[oid]; render(); save_silent();
}
function onText(bid,v){ text[bid]=v; save_silent(); }

function setLang(l){
  L=l; document.documentElement.lang=l;
  $('#lang-de').classList.toggle('on',l==='de'); $('#lang-en').classList.toggle('on',l==='en');
  document.querySelectorAll('[data-de]').forEach(el=>{ el.innerHTML=el.getAttribute('data-'+l)||el.getAttribute('data-de'); });
  render(); save_silent();
}
function optLabel(bid,oid){ const b=blockMeta(bid); const o=b.opts.find(x=>x.id===oid); return o?T(o):oid; }
function shortLabel(b){ return (T(b.label)||'').replace(/\s*\(.*?\)\s*/g,'').replace(/ —.*$/,'').replace(/[:?!.]\s*$/,'').trim(); }
function buildSummary(){
  const who=$('#who').value.trim();
  let out=(L==='de'?'🧭 KI-Reise-Tool — Feedback (LS)':'🧭 AI travel tool — feedback (LS)')+(who?(' · '+who):'')+'\n\n';
  SECTIONS.forEach((s,i)=>{
    let body='';
    s.blocks.forEach(b=>{
      if(b.type==='chips'){ const p=pick[b.id]||{}; const sel=Object.keys(p).filter(k=>p[k]).map(k=>optLabel(b.id,k));
        if(sel.length) body+='• '+(b.label?shortLabel(b)+': ':'')+sel.join(' · ')+'\n'; }
      else { const v=(text[b.id]||'').trim(); if(v) body+='✍️ '+shortLabel(b)+': '+v.replace(/\n/g,' / ')+'\n'; }
    });
    if(body){ out+=(i+1)+'. '+T(s.q)+' [LS·'+s.ls+']\n'+body+'\n'; }
  });
  return out;
}
async function shareFeedback(){
  save_silent(); const t=buildSummary();
  if(navigator.share){ try{ await navigator.share({title:(L==='de'?'KI-Reise-Tool Feedback':'AI travel tool feedback'),text:t}); flash(L==='de'?'✅ geteilt':'✅ shared'); return; }catch(e){ if(e&&e.name==='AbortError')return; } }
  const base=ION_WA?('https://wa.me/'+ION_WA+'?text='):'https://wa.me/?text=';
  window.open(base+encodeURIComponent(t),'_blank'); flash(L==='de'?'📱 WhatsApp öffnet…':'📱 opening WhatsApp…');
}
async function copyFeedback(){ const t=buildSummary();
  try{ await navigator.clipboard.writeText(t); flash(L==='de'?'📋 Kopiert! In WhatsApp/Chat einfügen.':'📋 Copied! Paste into WhatsApp/chat.'); }
  catch(e){ window.prompt(L==='de'?'Markieren & kopieren:':'Select & copy:', t); } }
function downloadJSON(){ const b=new Blob([JSON.stringify(collect(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='ki-reise-feedback.json'; a.click(); flash(L==='de'?'📤 Datei erstellt':'📤 file created'); }

const KEY='ki-reise-umfrage-ls-2026';
function collect(){ return {L,who:$('#who').value,pick,text}; }
function apply(s){ if(!s)return;
  if(s.who)$('#who').value=s.who;
  if(s.pick)pick=Object.assign(pick,s.pick);
  if(s.text)text=Object.assign(text,s.text);
  initState();
  if(s.L&&s.L!==L){setLang(s.L);} else {render();} }
function save_silent(){ try{localStorage.setItem(KEY,JSON.stringify(collect()));}catch(e){} }
function saveState(){ save_silent(); flash(L==='de'?'💾 Gesichert':'💾 Saved'); }
